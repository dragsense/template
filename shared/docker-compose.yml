services:
  # Full-Stack Service (Backend + Frontend in one container)
  app:
    image: template-app
    build:
      context: ..
      dockerfile: shared/Dockerfile
      target: dev
    container_name: template-app
    ports:
      - "3000:3000" # Backend port
      - "5173:5173" # Frontend port
    env_file:
      - ./.env
      - ../backend/.env
      - ../frontend/.env.dev
    environment:
      # MediaMTx Control API (must match mediamtx service auth)
      MEDIAMTX_API_USER: "admin"
      MEDIAMTX_API_PASS: "admin123"
    volumes:
      - ../frontend:/app/frontend
      - ../backend:/app/backend
      - ../shared:/app/shared
      - /app/frontend/node_modules
      - /app/backend/node_modules
      - /app/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dragonfly:
        condition: service_started
      mailpit:
        condition: service_started
      mqtt:
        condition: service_started
      mediamtx:
        condition: service_started
    # command: ["sh", "-c", "cd /app/backend && npm run dev & cd /app/frontend && npm run dev & wait"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: template-app-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: template-app-dragonfly
    restart: unless-stopped
    mem_limit: 6g # optional, matches Docker memory
    command: >
      dragonfly
      --maxmemory=5g # slightly less than container memory
    ports:
      - "6380:6379"
    networks:
      - app-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: template-app-redis-commander
    environment:
      - REDIS_HOSTS=local:dragonfly:6379
    ports:
      - "8082:8081"
    depends_on:
      - dragonfly
    restart: unless-stopped
    networks:
      - app-network

  # Mailpit for email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: template-app-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - app-network

  # PostgreSQL 17 Database
  postgres:
    image: postgres:17
    container_name: template-app-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: template_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # MQTT Broker (Eclipse Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: template-app-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - app-network

  # MediaMTx: RTSP → HLS/WebRTC; path-per-camera for thousands of streams
  # Auth: shared/mediamtx.yml allows anonymous playback, admin/admin123 for Control API.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vivast-mediamtx
    restart: unless-stopped
    ports:
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC (WHEP)
      - "9997:9997"   # Control API
      - "8189:8189/udp" # WebRTC ICE
      - "8189:8189/tcp" # WebRTC ICE TCP fallback
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    command: ["/mediamtx.yml"]
    # No healthcheck: official image has no wget/curl; app uses depends_on service_started
    networks:
      - app-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge